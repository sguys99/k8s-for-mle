# Phase 1 / 02-pod-deployment — RollingUpdate 전략 명시판
# 기본값(maxSurge 25%, maxUnavailable 25%) 대신 ML 메모리 관점에서 보수적으로 튜닝한 예시입니다.
#   - maxSurge: 1        → 한 번에 새 Pod 1개만 추가 (모델 600Mi × replicas+1 안에서 교체)
#   - maxUnavailable: 0  → 가용 capacity는 절대 깎이지 않음 (서빙 SLA 우선)
#   - minReadySeconds:10 → 새 Pod이 Ready된 뒤 10초간 죽지 않으면 다음 교체 진행
# labs 7단계에서 deployment-v1.yaml로 시작한 상태 위에 이 파일을 apply하고,
# kubectl set image로 v1↔v2 토글하면서 동시에 떠 있는 Pod 개수가 ≤ replicas+1로 유지되는지 관찰합니다.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentiment-api                # 기존 Deployment에 strategy를 덧씌웁니다
  labels:
    app: sentiment-api
    phase: "1"
spec:
  replicas: 3
  revisionHistoryLimit: 5
  # 핵심: 이 토픽의 학습 포인트
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1                    # 교체 중 동시에 띄울 수 있는 추가 Pod 수
      maxUnavailable: 0              # 교체 중 잠시 사라져도 되는 Pod 수 (0 = 무중단 우선)
  minReadySeconds: 10                # Ready 후 10초 안정화 확인 후에 다음 교체로 진행
  progressDeadlineSeconds: 300       # 5분 안에 롤아웃 못 끝내면 progress=False (실패로 간주)
  selector:
    matchLabels:
      app: sentiment-api
  template:
    metadata:
      labels:
        app: sentiment-api
    spec:
      containers:
        - name: app
          image: sentiment-api:v1    # set image로 v2 또는 다시 v1으로 토글
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: APP_VERSION
              value: "v1"
            - name: MODEL_NAME
              value: "cardiffnlp/twitter-roberta-base-sentiment"
          resources:
            requests:
              cpu: "200m"
              memory: "600Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 10
      terminationGracePeriodSeconds: 30

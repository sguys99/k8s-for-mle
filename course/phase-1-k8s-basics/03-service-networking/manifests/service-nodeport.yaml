# Phase 1 / 03-service-networking — NodePort Service (학습용 외부 노출)
# 노드(여기서는 minikube VM/컨테이너)의 IP에서 30080 포트로 도달 가능한 외부 노출 방식입니다.
# 학습/임시 디버깅에 적합하며, 프로덕션에서는 LoadBalancer 또는 Ingress(Phase 2)를 사용합니다.
# ClusterIP Service와 이름 충돌을 피하기 위해 "-np" 접미를 붙였습니다.
apiVersion: v1
kind: Service
metadata:
  name: sentiment-api-np
  labels:
    app: sentiment-api
    phase: "1"
spec:
  type: NodePort
  selector:
    app: sentiment-api                   # ClusterIP Service와 동일한 Pod 집합을 가리킵니다
  ports:
    - name: http
      port: 80                           # 클러스터 내부에서 보이는 Service 포트 (NodePort도 ClusterIP를 함께 갖습니다)
      targetPort: 8000                   # 컨테이너 포트
      nodePort: 30080                    # 노드 IP의 외부 노출 포트. 30000–32767 범위에서 고정 (학습자별 일관성 확보)
      protocol: TCP

# sentiment-api 차트의 메타데이터
# 본 차트는 Phase 2/05 의 sentiment-api-dev.yaml + sentiment-api-prod.yaml (5개 자원 × 2 namespace) 을
# 단일 차트로 묶고, values-dev.yaml / values-prod.yaml 로 환경 차이만 분리한 결과입니다.
#
# 버전 두 종류:
#   ・ version    = 차트 자체의 버전 (SemVer). templates 또는 values.yaml 이 변하면 올립니다.
#   ・ appVersion = 본 차트가 배포하는 sentiment-api 앱의 버전. Phase 0 에서 만든 sentiment-api:v1 이미지의 태그.
# 두 버전은 독립이며, appVersion 은 이미지 태그와 일치시키는 것이 운영 표준입니다.

apiVersion: v2                                 # Helm v3 차트는 항상 v2 (Helm v2 의 v1 과 다름)
name: sentiment-api
description: ML model serving chart — wraps Phase 2 ConfigMap/Secret/PVC/Deployment/Service into one chart
type: application                              # library 가 아닌 일반 차트

version: 0.1.0                                 # 차트 버전 — Phase 3/02 가 servicemonitor 추가하면 0.2.0
appVersion: "v1"                               # sentiment-api 앱 버전 — Phase 0 에서 만든 이미지 태그

keywords:
  - ml
  - serving
  - inference
  - huggingface
  - sentiment-classification

maintainers:
  - name: k8s-for-mle learner

# 의존 차트 (선택). 본 토픽에서는 사용하지 않습니다.
# Phase 3/02 의 kube-prometheus-stack 이 의존 차트의 첫 사례가 됩니다.

# templates/serviceaccount.yaml — Phase 3/04 (RBAC) 가 추가한 templates.
#
# 동작 조건:
#   .Values.serviceAccount.create == true 일 때만 렌더링.
#   false 면 Pod 의 spec.serviceAccountName 은 _helpers.tpl 의 sentiment-api.serviceAccountName 헬퍼가
#   "default" 로 폴백 — 차트가 SA 매니페스트를 만들지 않습니다.
#
# automountServiceAccountToken:
#   sentiment-api 추론 컨테이너는 K8s API 를 호출할 일이 거의 없으므로 SA 자체에서 false 로 토큰 마운트를 차단합니다.
#   ⇒ Pod 침해 시 Bearer 토큰으로 cluster API 를 호출할 수 있는 경로가 사라짐 (Phase 3/04 lesson.md 자주 하는 실수 3번).
#   특정 워크로드가 K8s API 호출이 필요해지면 values 에서 명시적으로 true 로 켜고, Pod spec 에서도 가능 — Pod 의 값이 SA 의 값을 override.
#
# Phase 3/04 가 추가하기 전:
#   sentiment-api Pod 는 자동으로 prod namespace 의 default SA 를 사용했고, default SA 에 토큰이 마운트되어 있었습니다.
#   본 templates 활성화 후 sentiment-api Pod 는 release 이름의 전용 SA 를 사용하고 토큰이 마운트되지 않습니다.

{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "sentiment-api.serviceAccountName" . }}
  labels:
    {{- include "sentiment-api.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  # ML 운영 패턴 — IRSA (EKS) / Workload Identity (GKE) 가 SA 의 annotations 으로 외부 IAM 과 결합:
  #   eks.amazonaws.com/role-arn: arn:aws:iam::123:role/sentiment-api
  #   iam.gke.io/gcp-service-account: sentiment-api@<project>.iam.gserviceaccount.com
  # 본 차트는 minikube 학습 환경이라 빈 값이 기본 — values-prod.yaml 에서 환경에 맞게 채우면 됩니다.
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automountToken | default false }}
{{- end }}

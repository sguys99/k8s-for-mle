# templates/hpa.yaml — Phase 3/03 (Autoscaling) 에서 활성화되는 자원.
#
# 본 토픽 (Phase 3/01) 에서는 values.yaml 의 autoscaling.enabled 가 false 라
# 이 파일은 빈 문자열을 렌더하고 → kubectl 에 전달되지 않습니다 (= 사실상 비활성).
#
# Phase 3/03 의 lab 2 단계에서 다음 명령으로 활성화됩니다:
#   helm upgrade sentiment-api ... -f values-prod.yaml --set autoscaling.enabled=true
#
# 동작 원리:
# 1) kube-controller-manager 의 horizontal-pod-autoscaler controller 가 기본 15초마다
#    metrics.k8s.io API (metrics-server 가 서빙) 에서 본 Pod 들의 CPU 사용률을 조회.
# 2) `desiredReplicas = ceil(currentReplicas × currentCPU / targetCPU)` 로 desired 계산.
# 3) 결과를 Deployment 의 /scale subresource 로 patch → ReplicaSet 이 Pod 개수 조정.
#
# 핵심 전제:
#   ・ Deployment 의 컨테이너에 resources.requests.cpu 가 반드시 설정되어 있어야 함 (백분율의 분모).
#     values.yaml 의 resources: {} 디폴트는 이 조건을 만족하지 못하므로 dev 환경에선 동작 안 함 —
#     LimitRange default 가 채워주는 환경이거나, values-prod.yaml 처럼 명시 환경에서만 의미 있음.
#     (lesson.md 자주 하는 실수 1번)
#   ・ apiVersion 은 autoscaling/v2 사용 — autoscaling/v1 은 CPU 만 지원하고 behavior 블록 없음.
#     v2beta2 는 K8s v1.26 부터 deprecated.

{{- if .Values.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sentiment-api
  labels:
    {{- include "sentiment-api.labels" . | nindent 4 }}
spec:
  # scaleTargetRef — 어느 Deployment 의 replicas 를 조정할지.
  # apiVersion / kind / name 셋이 모두 일치해야 함. Deployment 의 metadata.name 과 정확히 같은 값을 써야 함.
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sentiment-api
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  # metrics — 어떤 신호로 스케일할지. 본 차트는 표준 패턴인 Resource CPU 만 노출.
  # (Pods/Object/External 메트릭이 필요하면 standalone HPA 매니페스트로 별도 적용 — Phase 3/03 manifests/hpa-custom-metric.yaml 참고)
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
  {{- with .Values.autoscaling.behavior }}
  # behavior — autoscaling/v2 의 핵심 기능. scaleUp / scaleDown 의 stabilization 윈도우와 정책을 분리해 설정 가능.
  # values.yaml 디폴트는 빈 dict ({}) 라 이 블록 자체가 생략 → K8s 기본값 (scaleDown 5분, scaleUp 즉시) 사용.
  # values-prod.yaml 이 명시적으로 비대칭 설정을 주입 (lesson.md 1-3 참고).
  behavior:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}

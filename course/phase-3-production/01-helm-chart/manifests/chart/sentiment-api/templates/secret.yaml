# templates/secret.yaml — Phase 2/01 의 Secret 을 차트화한 결과.
#
# ⚠️ 본 차트의 values.yaml 은 secrets.hfToken: "" 으로 비워 둡니다.
#    실 토큰은 helm install 시 --set secrets.hfToken=$HF_TOKEN 으로 주입하거나, 운영에서는
#    External Secrets / SealedSecrets / helm secrets+sops 로 git 외부에서 들여옵니다 (lesson.md 자주 하는 실수 3번).
#
# values.hfToken 이 비어 있을 때는 placeholder 문자열을 넣어 차트가 그래도 install 되도록 합니다 —
# 본 모델(cardiffnlp/twitter-roberta-base-sentiment) 은 public 이라 토큰 없이도 동작합니다.
# private 모델로 바꿀 때 --set 으로 주입하면 됩니다.

apiVersion: v1
kind: Secret
metadata:
  name: sentiment-api-secrets
  labels:
    {{- include "sentiment-api.labels" . | nindent 4 }}
type: Opaque
stringData:
  # default 함수: 첫 인자가 falsy(빈 문자열 / null / 0) 면 두 번째 인자를 사용
  HF_TOKEN: {{ .Values.secrets.hfToken | default "hf_REPLACE_ME_WITH_REAL_TOKEN" | quote }}

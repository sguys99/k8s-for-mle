# values-prod.yaml — prod 환경 override
#
# 사용:
#   helm install sentiment-api ./manifests/chart/sentiment-api \
#       -n prod \
#       -f manifests/chart/sentiment-api/values-prod.yaml \
#       --set secrets.hfToken=$HF_TOKEN
#
# Phase 2/05 의 sentiment-api-prod.yaml 와 같은 결과를 만드는 override.
# 운영 자산은 LimitRange default 에 의존하지 않고 resources 를 항상 명시 — Phase 2/05 lesson.md 1-5 절의 운영 원칙.

replicaCount: 2                                # 가용성 — 1 Pod 죽어도 Service 가 다른 Pod 로 라우팅

env:
  APP_VERSION: "v1-helm-prod"
  LOG_LEVEL: "INFO"                            # prod 는 정보 수준 (DEBUG 는 노이즈)
  HF_HOME: "/cache"

model:
  batchSize: 32                                # prod 는 큰 batch — 처리량 우선
  timeoutSeconds: 60

# 운영 표준: resources 명시. LimitRange default 에 의존하지 않음.
# - prod-limitrange Container max: cpu 8 / memory 16Gi → 본 값 충분히 통과
# - maxLimitRequestRatio cpu 4 → 1 / 500m = 2 ✓
resources:
  requests:
    cpu: "500m"                                # SLA 보장량 — Phase 3/03 HPA 의 기준값이 됩니다
    memory: "1Gi"
  limits:
    cpu: "1"                                   # ratio 2 — burst 여유 적당히
    memory: "2Gi"

persistence:
  enabled: true
  size: 2Gi                                    # prod 는 모델 가중치 + 추가 메타파일 여유

# ─ Autoscaling (Phase 3/03 에서 활성화) ─────────────────────────────────────
# resources.requests.cpu: 500m 가 위에 명시되어 있으므로 HPA 의 백분율 계산이 정상 동작합니다.
# ML 추론 워크로드 특성상 scaleUp 은 즉시, scaleDown 은 보수적으로 설정 (cold start 비용 30s+).
autoscaling:
  enabled: true                                # Phase 3/03 lab 2 단계에서 helm upgrade --set 으로 켜는 것이 표준이지만, prod 의 의도된 상태는 true
  minReplicas: 2                               # 가용성 — 1 Pod 만으로 운영하지 않음
  maxReplicas: 8                               # 비용 상한 — minikube 학습 환경에선 4–5 정도가 실제 한계
  targetCPUUtilizationPercentage: 70           # requests 500m 의 70% = 350m 도달 시 스케일 아웃
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300          # 부하 종료 후 5분 동안 desired 의 max 유지 → flapping 방지
    scaleUp:
      stabilizationWindowSeconds: 0            # spike 시 즉시 반응
      policies:
        - type: Percent
          value: 100                           # 한 번의 평가 윈도우에 최대 100% 증가 (2 → 4 → 8)
          periodSeconds: 60

# ─ RBAC (Phase 3/04 에서 활성화) ─────────────────────────────────────────────
# prod 환경의 의도된 상태:
#   - 전용 ServiceAccount (release 이름) 사용 — default SA 의존 제거
#   - Pod / SA 양쪽 모두 토큰 마운트 차단 (자주 하는 실수 3번 방지)
#   - Role 은 생성하지만 rules 비움 — 진짜 최소 권한 (Phase 3/04 lesson.md 1-5 (a) 패턴)
serviceAccount:
  create: true
  name: ""                                     # 빈 값 → _helpers.tpl 가 "sentiment-api" 반환
  automountToken: false                        # 추론 Pod 의 보안 표준
  annotations: {}                              # EKS/GKE 환경에선 IRSA / Workload Identity 의 IAM role ARN 을 채움

rbac:
  create: true
  rules: []                                    # 의도적으로 비움 — sentiment-api 는 K8s API 호출이 필요 없는 워크로드

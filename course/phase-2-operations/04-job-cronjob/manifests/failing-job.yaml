# Phase 2 / 04-job-cronjob — backoffLimit 동작을 직접 관찰하기 위한 의도적 실패 Job
#
# 학습 목적:
#   - "컨테이너가 실패하면 Job 이 어떻게 행동하는가" 를 짧은 사이클(2초)로 반복해서 관찰
#   - backoffLimit: 2 → 첫 실행 1번 + 재시도 2번 = 총 3번 실패 후 Job 이 Failed 로 전이
#   - kubectl describe job 의 Conditions 에 `BackoffLimitExceeded` 가 적힘
#   - kubectl get pods 에 Error 상태 Pod 가 3개 누적 → ttlSecondsAfterFinished 후 정리
#
# 의도적으로 sentiment-api:v1 대신 busybox 를 사용한 이유:
#   - 모델 로딩 시간(수십 초) 없이 즉시 실패 사이클을 시연 → 학습자가 backoff 동작에 집중
#   - Job 의 핵심 메커니즘(restartPolicy / backoffLimit / Conditions) 은 이미지와 무관함을 강조
apiVersion: batch/v1
kind: Job
metadata:
  name: failing-job-demo
  labels:
    app: failing-demo
    phase: "2"
    topic: "04-job-cronjob"
    purpose: "backoff-demo"
spec:
  # backoffLimit: 2 → 첫 실행 + 재시도 2번 후 Job 자체가 Failed 로 종료.
  # 이 값을 빼면 기본 6 이 적용되어 디버깅 시 Pod 6개가 쌓여 학습자가 당황하는 함정 발생.
  backoffLimit: 2
  # activeDeadlineSeconds: 백오프 인터벌(지수증가, 10s, 20s, 40s, ...) 을 고려해도 60초면 충분.
  # backoffLimit 보다 먼저 도달하면 그 즉시 Job 이 종료되어 BackoffLimitExceeded 와는 다른 종료 사유가 됨.
  activeDeadlineSeconds: 60
  # 실패한 Pod 도 ttl 적용 — 학습 후 자동 정리.
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: failing-demo
    spec:
      restartPolicy: OnFailure              # Job 이라 Always 불가. OnFailure 로 같은 Pod 안에서 컨테이너 재시작.
      containers:
        - name: fail
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          # 의도적 실패: 메시지 출력 → 2초 대기 → exit 1
          command: ["sh", "-c", "echo 'simulating a failing batch job'; sleep 2; exit 1"]
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"

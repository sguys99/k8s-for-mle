# Phase 2 / 01-configmap-secret — 자격 증명용 Secret
# 목적: HuggingFace 토큰처럼 "git 에 절대 커밋되면 안 되는 값" 을 컨테이너에 주입하는 표준 패턴을 학습합니다.
# 주입 방식: deployment.yaml 의 envFrom.secretRef 로 컨테이너 환경 변수에 등록됩니다.
#
# ⚠️ 보안 주의 ─────────────────────────────────────────────────────────────────
# - K8s Secret 의 data 필드는 base64 "인코딩" 일 뿐 "암호화" 가 아닙니다.
#   `kubectl get secret -o jsonpath='{.data.HF_TOKEN}' | base64 -d` 로 평문 복원 가능합니다.
# - 본 파일은 **학습용 placeholder** 입니다. 실제 토큰을 채워서 git 에 커밋하지 마세요.
#   실 토큰을 쓸 때는 secret-real.yaml 같은 별도 파일에 두고 manifests/.gitignore 로 제외합니다.
# - 운영에서는 SealedSecret(bitnami) 또는 External Secrets Operator(AWS Secrets Manager / Vault 연동) 를 사용합니다.
# ────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: sentiment-api-secrets
  labels:
    app: sentiment-api
    phase: "2"
    topic: "01-configmap-secret"
type: Opaque                  # 일반 자격 증명. type 에는 그 외 dockerconfigjson, tls, basic-auth 등이 있음
stringData:                   # data: 와 달리 평문 그대로 작성 → kubectl 이 자동으로 base64 인코딩
  # transformers 라이브러리는 HF_TOKEN(또는 HUGGING_FACE_HUB_TOKEN) 환경 변수가 있으면 자동으로 사용합니다.
  # 본 토픽은 공개 모델(cardiffnlp/twitter-roberta-base-sentiment)을 쓰므로 토큰이 없어도 동작합니다.
  # 즉, 이 키는 "주입 패턴 시연" 이 1차 목적이며, private 모델 전환 시 자연스럽게 그대로 사용됩니다.
  HF_TOKEN: "hf_REPLACE_ME_WITH_REAL_TOKEN"

  # 캡스톤 RAG 에서 쓰일 키들. 본 토픽 범위 밖이라 주석 처리.
  # OPENAI_API_KEY: "sk-..."
  # AWS_ACCESS_KEY_ID: ""
  # AWS_SECRET_ACCESS_KEY: ""

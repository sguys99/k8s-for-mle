# Phase 2 / 03-ingress — PVC + initContainer 로 모델을 캐시하는 sentiment-api Deployment
# 02 의 deployment.yaml 과 사실상 동일합니다 (label 의 topic 만 갱신).
# 본 토픽은 외부 라우팅이 주제이므로 백엔드 자체는 손대지 않습니다.
#   - replicas: 2 — 02 와 동일. ingress 트래픽이 두 Pod 사이에서 분산되는 것을 lab 7 의 access log 로 확인합니다.
#   - initContainers / volumes / volumeMounts — 02 의 PVC 캐시 패턴 그대로.
#   - probes / resources — 01·02 와 동일.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentiment-api                      # 02 와 동일 이름 → labs 0 단계에서 02 잔여 정리 안내
  labels:
    app: sentiment-api
    phase: "2"
    topic: "03-ingress"
spec:
  replicas: 2                              # ingress 가 두 Pod 사이로 라운드로빈하는 것을 lab 7 access log 에서 관찰
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: sentiment-api
  template:
    metadata:
      labels:
        app: sentiment-api
      annotations:
        # ConfigMap/Secret 변경 시 손으로 v2, v3 으로 올리거나 `kubectl rollout restart` 사용 (01·02 패턴 동일)
        checksum/config: "manual-v1"
    spec:
      # ── initContainers: 모델을 한 번만 PVC 로 다운로드 (02 패턴 그대로) ──
      # 같은 sentiment-api:v1 이미지를 재사용합니다 (transformers / huggingface_hub 가 이미 들어 있음).
      # 두 번째 기동부터는 snapshot_download 가 캐시 매니페스트만 보고 즉시 종료하므로 ~수 초만에 완료됩니다.
      initContainers:
        - name: model-downloader
          image: sentiment-api:v1
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: sentiment-api-config       # MODEL_NAME, HF_HOME 등을 그대로 사용
            - secretRef:
                name: sentiment-api-secrets      # private 모델 전환 시 HF_TOKEN 자동 사용
          command: ["python", "-c"]
          args:
            - |
              import os
              from huggingface_hub import snapshot_download
              repo_id = os.environ["MODEL_NAME"]
              cache_dir = os.environ["HF_HOME"] + "/hub"
              print(f"[init] caching {repo_id} -> {cache_dir}")
              snapshot_download(repo_id=repo_id, cache_dir=cache_dir)
              print("[init] done")
          volumeMounts:
            - name: model-cache
              mountPath: /cache                  # HF_HOME 값과 일치 → 라이브러리가 자동 인식
          resources:
            requests:
              cpu: "200m"
              memory: "500Mi"
            limits:
              cpu: "1"
              memory: "1500Mi"
      # ────────────────────────────────────────────────────────────────────
      containers:
        - name: app
          image: sentiment-api:v1               # Phase 1/04 lab 1 단계에서 minikube 에 적재한 이미지
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000

          # ConfigMap/Secret 의 모든 키를 한꺼번에 환경 변수로 주입.
          # HF_HOME 도 ConfigMap 에서 함께 주입되므로 transformers 가 PVC 캐시를 자동 사용합니다.
          envFrom:
            - configMapRef:
                name: sentiment-api-config
            - secretRef:
                name: sentiment-api-secrets

          # ── PVC + ConfigMap 마운트 (02 와 동일) ─────────────────────────
          volumeMounts:
            - name: model-cache
              mountPath: /cache
            - name: inference-config            # ConfigMap 의 inference.yaml 키만 파일로 마운트
              mountPath: /etc/inference/inference.yaml
              subPath: inference.yaml
              readOnly: true
          # ────────────────────────────────────────────────────────────────

          resources:
            requests:
              cpu: "250m"
              memory: "800Mi"
            limits:
              cpu: "1"
              memory: "1500Mi"
          # readinessProbe: 모델 로딩이 끝나야 200 → init 로 모델은 이미 디스크에 있으나
          # transformers.pipeline() 자체의 메모리 적재 시간(수 초~수십 초) 은 여전히 필요합니다.
          # ingress controller 도 backend Pod 이 Ready 일 때만 트래픽을 보내므로 이 probe 가 정확해야 합니다.
          readinessProbe:
            httpGet: { path: /ready, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 24
            timeoutSeconds: 2
          livenessProbe:
            httpGet: { path: /healthz, port: 8000 }
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 2
      # ── volumes: PVC 와 ConfigMap 두 개 ──────────────────────────────────
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache              # pvc.yaml 의 metadata.name 과 일치
        - name: inference-config
          configMap:
            name: sentiment-api-config
            items:
              - key: inference.yaml
                path: inference.yaml
      terminationGracePeriodSeconds: 30

# Phase 2 / 03-ingress — 모델 가중치 캐시용 PVC (02 와 동일, label 의 topic 만 갱신)
# 본 토픽은 외부 라우팅이 주제이므로 02 의 PVC 가 살아 있다면 그대로 재사용해도 됩니다.
# 처음 만들면 minikube 의 기본 StorageClass(`standard`, k8s.io/minikube-hostpath) 가
# 동적으로 PV 를 만들어 묶어 줍니다.
#
# accessModes 선택 이유:
#   ReadWriteOnce(RWO) — minikube 의 기본 StorageClass 인 hostPath 가 RWO 만 지원합니다.
#   같은 노드에 떠 있는 여러 Pod 이 같은 PVC 를 RWO 로 함께 마운트하는 것은 가능하므로
#   replicas: 2 의 두 Pod 이 캐시를 공유합니다 (02 lab 7 단계 참고).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-cache
  labels:
    app: sentiment-api
    phase: "2"
    topic: "03-ingress"
spec:
  accessModes:
    - ReadWriteOnce              # minikube hostPath 의 한계
  storageClassName: standard      # `kubectl get sc` 출력의 (default) 마크가 있는 클래스
  resources:
    requests:
      storage: 2Gi               # roberta-base ~500MB + tokenizer/config + 여유

# namespaces.yaml — Phase 2 / 05-namespace-quota
#
# 본 토픽의 출발점. dev / staging / prod 3개의 Namespace 를 한 파일에 List
# 매니페스트(`---` 구분) 로 정의합니다. apply 후 다음을 보장합니다:
#   ① 04 까지 누적된 default 자산은 그대로 유지 (격리 검증의 기준선)
#   ② dev / staging / prod 3개 namespace 가 모두 Active 상태가 됨
#   ③ 각 namespace 에 env / team 라벨이 붙어 이후 ResourceQuota·LimitRange·
#      NetworkPolicy 등이 selector 없이도 환경별로 식별 가능
#
# ─ 관련 매니페스트 ─
#  • dev-quota.yaml / dev-limitrange.yaml      (dev 환경 자원 제어)
#  • prod-quota.yaml / prod-limitrange.yaml    (prod 환경 자원 제어)
#  • staging 은 본 파일에서 namespace 만 만들고, quota/limitrange 는
#    학습자가 dev 매니페스트를 참고해 직접 만들도록 의도적으로 비워둡니다.
#
# 함정 1: Namespace 는 cluster-scoped 자원입니다. 따라서 매니페스트 안에
#         metadata.namespace 를 적으면 안 됩니다 (적어도 무시되지만 혼란을 줌).
# 함정 2: `kubectl delete namespace <name>` 은 안의 모든 namespaced 자원을
#         cascade 삭제합니다. prod 에 본격 자산이 들어간 뒤에는 함부로
#         삭제하지 않도록 주의하세요 (자주 하는 실수 3번).

apiVersion: v1
kind: Namespace
metadata:
  name: dev
  labels:
    env: dev                      # 환경 식별 라벨 — Phase 3 Prometheus 가 라벨로 메트릭을 분리
    team: ml-platform             # 팀 식별 — 멀티팀 클러스터에서 RBAC·NetworkPolicy 의 selector 로 사용
    purpose: experimentation      # 운영 정책 힌트 — 자유로운 실험·짧은 TTL 가정
---
apiVersion: v1
kind: Namespace
metadata:
  name: staging
  labels:
    env: staging
    team: ml-platform
    purpose: pre-prod-validation  # prod 와 동일 비율의 자원 제약을 두고 prod 와 동일한 매니페스트로 검증하는 환경
---
apiVersion: v1
kind: Namespace
metadata:
  name: prod
  labels:
    env: prod
    team: ml-platform
    purpose: production-serving   # SLA 가 걸린 운영 — 보수적 default, 큰 max

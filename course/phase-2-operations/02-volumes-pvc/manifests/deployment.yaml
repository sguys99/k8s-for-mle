# Phase 2 / 02-volumes-pvc — PVC 와 initContainer 로 모델 가중치를 캐시하는 sentiment-api Deployment
# Phase 2/01 의 deployment.yaml 을 베이스로 다음 세 가지를 추가했습니다.
#   1. initContainers: model-downloader — 모델을 PVC 에 한 번만 다운로드
#   2. main 컨테이너에 model-cache 볼륨 마운트 (HF_HOME=/cache 와 짝)
#   3. volumes 에 PVC 추가 (volume name: model-cache)
# replicas / image / probes / resources / envFrom / inference.yaml 마운트는 01 과 동일하게 유지합니다.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentiment-api                      # 01 과 동일 이름 → labs 0 단계에서 01 잔여 정리 안내
  labels:
    app: sentiment-api
    phase: "2"
    topic: "02-volumes-pvc"
spec:
  replicas: 2                              # 같은 노드의 두 Pod 이 같은 PVC(RWO) 를 공유함을 lab 7 에서 시연
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: sentiment-api
  template:
    metadata:
      labels:
        app: sentiment-api
      annotations:
        # ConfigMap/Secret 변경 시 손으로 v2, v3 으로 올리거나 `kubectl rollout restart` 사용 (01 패턴 동일)
        checksum/config: "manual-v1"
    spec:
      # ── initContainers: 모델을 한 번만 PVC 로 다운로드 ───────────────────
      # 같은 sentiment-api:v1 이미지를 재사용합니다 (transformers / huggingface_hub 가 이미 들어 있음).
      # 두 번째 기동부터는 snapshot_download 가 캐시 매니페스트만 보고 즉시 종료하므로 ~수 초만에 완료됩니다.
      # 운영에서는 이 자리를 awscli/boto3 init container 로 교체해 S3 에서 받습니다 — 패턴은 동일합니다.
      initContainers:
        - name: model-downloader
          image: sentiment-api:v1
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: sentiment-api-config       # MODEL_NAME, HF_HOME 등을 그대로 사용
            - secretRef:
                name: sentiment-api-secrets      # private 모델 전환 시 HF_TOKEN 자동 사용
          command: ["python", "-c"]
          args:
            - |
              import os
              from huggingface_hub import snapshot_download
              repo_id = os.environ["MODEL_NAME"]
              cache_dir = os.environ["HF_HOME"] + "/hub"
              print(f"[init] caching {repo_id} -> {cache_dir}")
              snapshot_download(repo_id=repo_id, cache_dir=cache_dir)
              print("[init] done")
          volumeMounts:
            - name: model-cache
              mountPath: /cache                  # HF_HOME 값과 일치 → 라이브러리가 자동 인식
          resources:
            requests:
              cpu: "200m"
              memory: "500Mi"
            limits:
              cpu: "1"
              memory: "1500Mi"
      # ────────────────────────────────────────────────────────────────────
      containers:
        - name: app
          image: sentiment-api:v1               # 01 lab 0 단계에서 minikube 에 적재한 이미지 그대로 재사용
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000

          # 01 과 동일: ConfigMap/Secret 의 모든 키를 한꺼번에 환경 변수로 주입.
          # HF_HOME 도 ConfigMap 에서 함께 주입되므로 transformers 가 PVC 캐시를 자동 사용합니다.
          envFrom:
            - configMapRef:
                name: sentiment-api-config
            - secretRef:
                name: sentiment-api-secrets

          # ── 본 토픽에서 추가: PVC 마운트 (init 과 같은 mountPath) ────────
          # readOnly: true 로 두지 않습니다 — transformers 가 처음 로드 시
          # 캐시에 lock 파일/메타파일을 추가로 쓸 수 있기 때문입니다.
          # (01 의 inference-config 는 ConfigMap 이라 readOnly: true 였음)
          volumeMounts:
            - name: model-cache
              mountPath: /cache
            - name: inference-config            # 01 과 동일: ConfigMap 의 inference.yaml 키만 파일로 마운트
              mountPath: /etc/inference/inference.yaml
              subPath: inference.yaml
              readOnly: true
          # ────────────────────────────────────────────────────────────────

          resources:
            requests:
              cpu: "250m"
              memory: "800Mi"
            limits:
              cpu: "1"
              memory: "1500Mi"
          # readinessProbe: 모델 로딩이 끝나야 200 → init 로 모델은 이미 디스크에 있으나
          # transformers.pipeline() 자체의 메모리 적재 시간(수 초~수십 초) 은 여전히 필요합니다.
          # 그래도 첫 다운로드 시간(30–90초) 이 빠지므로 01 보다 빨리 Ready 가 됩니다.
          readinessProbe:
            httpGet: { path: /ready, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 24
            timeoutSeconds: 2
          livenessProbe:
            httpGet: { path: /healthz, port: 8000 }
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 2
      # ── volumes: PVC 와 ConfigMap 두 개 ──────────────────────────────────
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache              # pvc.yaml 의 metadata.name 과 일치
        - name: inference-config
          configMap:
            name: sentiment-api-config
            items:
              - key: inference.yaml
                path: inference.yaml
      terminationGracePeriodSeconds: 30

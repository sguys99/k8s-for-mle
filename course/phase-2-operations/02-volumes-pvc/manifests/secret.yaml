# Phase 2 / 02-volumes-pvc — 자격 증명용 Secret
# 01 의 secret.yaml 과 내용 동일 (label 의 topic 만 갱신).
# 본 토픽이 사용하는 모델 cardiffnlp/twitter-roberta-base-sentiment 는 공개 모델이므로 토큰 없이도 동작합니다.
# Secret 은 "주입 패턴 시연" 과 "private 모델 전환 시 그대로 사용 가능한 자리" 를 보여주는 목적입니다.
#
# ⚠️ 보안 주의 ─────────────────────────────────────────────────────────────────
# - Secret 의 data 필드는 base64 "인코딩" 일 뿐 "암호화" 가 아닙니다 (Phase 2/01 lab 2 단계에서 검증).
# - 본 파일은 학습용 placeholder 입니다. 실제 토큰을 채워서 git 에 커밋하지 마세요.
# - 운영에서는 SealedSecret 또는 External Secrets Operator 를 사용합니다 (Phase 5).
# ────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: sentiment-api-secrets
  labels:
    app: sentiment-api
    phase: "2"
    topic: "02-volumes-pvc"
type: Opaque
stringData:
  # transformers / huggingface_hub 가 자동으로 인식하는 환경 변수 이름.
  # private 모델로 전환할 때 이 placeholder 만 실 토큰으로 바꾸면 됩니다.
  HF_TOKEN: "hf_REPLACE_ME_WITH_REAL_TOKEN"

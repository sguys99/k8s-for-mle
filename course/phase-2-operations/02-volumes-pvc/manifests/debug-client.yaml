# Phase 2 / 02-volumes-pvc — 클러스터 내부 호출 검증용 디버깅 Pod
# 01 의 debug-client.yaml 과 동일합니다 (label 의 topic 만 갱신).
# labs 에서 이 Pod 안으로 들어가 /ready, /predict 응답을 확인합니다.
apiVersion: v1
kind: Pod
metadata:
  name: debug-client
  labels:
    role: debug-client
    phase: "2"
    topic: "02-volumes-pvc"
spec:
  restartPolicy: Never
  containers:
    - name: client
      image: curlimages/curl:8.10.1
      imagePullPolicy: IfNotPresent
      command: ["sh", "-c", "sleep 36000"]
      resources:
        requests:
          cpu: "10m"
          memory: "16Mi"
        limits:
          cpu: "100m"
          memory: "64Mi"
  terminationGracePeriodSeconds: 5

# Phase 2 / 02-volumes-pvc — 모델 가중치 캐시용 PVC
# 목적: HuggingFace 에서 받은 roberta-base 가중치(~500MB) 를 영구 저장해
#       Pod 가 재시작해도 다시 다운로드하지 않도록 합니다.
#
# 동작 흐름:
#   1) 이 PVC 를 적용하면 minikube 의 기본 StorageClass(`standard`, k8s.io/minikube-hostpath)
#      가 자동으로 PV 를 1개 만들어 PVC 와 묶습니다 (동적 프로비저닝).
#   2) deployment.yaml 의 initContainer(model-downloader) 가 이 PVC 를 /cache 에 마운트하고
#      huggingface_hub.snapshot_download() 로 모델을 /cache/hub 아래에 받습니다.
#   3) 메인 컨테이너(app) 도 같은 PVC 를 /cache 로 마운트하고 HF_HOME=/cache 환경 변수만
#      설정하면 transformers 라이브러리가 자동으로 그 캐시를 읽습니다 — 앱 코드 수정 없음.
#
# accessModes 선택 이유:
#   ReadWriteOnce(RWO) — minikube 의 기본 StorageClass 인 hostPath 가 RWO 만 지원합니다.
#   같은 노드에 떠 있는 여러 Pod 이 같은 PVC 를 RWO 로 함께 마운트하는 것은 가능하므로
#   replicas: 2 의 두 Pod 이 캐시를 공유합니다 (lab 7 단계에서 직접 확인).
#   ReadWriteMany(RWX) 가 필요하면 NFS / CephFS / AWS EFS / Azure Files / CSI 가 필요한데
#   본 토픽 범위 밖입니다 (lesson.md 1-3 표 참고).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-cache
  labels:
    app: sentiment-api
    phase: "2"
    topic: "02-volumes-pvc"
spec:
  accessModes:
    - ReadWriteOnce              # minikube hostPath 의 한계, lesson.md 1-3 비교
  storageClassName: standard      # `kubectl get sc` 출력의 (default) 마크가 있는 클래스
  resources:
    requests:
      storage: 2Gi               # roberta-base ~500MB + tokenizer/config + 여유

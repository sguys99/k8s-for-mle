# 출처: course/phase-4-ml-on-k8s/03-vllm-llm-serving/manifests/vllm-hf-secret.yaml
#       (이전 단계: course/phase-2-operations/01-configmap-secret/manifests/hf-secret.yaml)
#
# 캡스톤 Day 4 — HuggingFace 토큰 Secret. Phase 4-3 원본 대비 2 가지 변경:
#   ① namespace: rag-llm 추가
#   ② labels 캡스톤 컨벤션 통일 — app=vllm, component=llm-serving
#
# ⚠ 본 캡스톤 Day 4 의 디폴트는 Secret 미적용 입니다 — phi-2 는 public 모델이라 토큰 없이 다운로드됩니다.
#   20-vllm-deployment.yaml 의 valueFrom.secretKeyRef.optional: true 가 Secret 부재를 정상 처리합니다.
#
# Secret apply 가 *필수* 가 되는 두 시나리오 (lesson.md §4.3 결정 박스 ④):
#   ① HuggingFace anonymous rate limit 도달 (시간당 수십 회 다운로드 시 401 Unauthorized)
#   ② gated 모델 (meta-llama/Llama-3.x-Instruct, mistralai/Mistral-7B-Instruct-v0.3 등) 로 교체
# 두 경우 모두 학습자는 아래 stringData 의 placeholder 를 본인 토큰으로 바꿔 apply:
#   sed -i.bak 's/REPLACE_WITH_YOUR_HF_TOKEN/hf_your_token_here/' \
#     course/capstone-rag-llm-serving/manifests/23-vllm-hf-secret.yaml
#   kubectl apply -f course/capstone-rag-llm-serving/manifests/23-vllm-hf-secret.yaml
#
# ⚠ 본 파일을 git 에 커밋하기 *전* 에 placeholder 를 진짜 토큰으로 바꾸지 마세요.
#   - 실습용: 로컬에서만 토큰을 임시 입력하고 적용. 작업 후 git checkout 으로 placeholder 복원.
#   - 운영: SealedSecrets / External Secrets Operator / Workload Identity 로 평문 토큰이 매니페스트에 안 남게.

apiVersion: v1
kind: Secret
metadata:
  name: hf-secret                                       # 20-vllm-deployment.yaml 의 secretKeyRef.name 과 일치
  namespace: rag-llm
  labels:
    app: vllm
    component: llm-serving
type: Opaque
stringData:
  # HuggingFace > Settings > Access Tokens 에서 "read" 권한 토큰 발급 후 붙여넣습니다.
  # phi-2 만 쓸 거면 빈 문자열로 두거나 본 매니페스트 자체를 미적용해도 됩니다 (Deployment 의 optional: true 가 동작).
  HF_TOKEN: "REPLACE_WITH_YOUR_HF_TOKEN_OR_LEAVE_EMPTY"

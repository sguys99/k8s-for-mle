# 출처:
#   ① 패턴       → course/phase-2-operations/01-configmap-secret/manifests/secret.yaml
#                  (Opaque + stringData 평문 패턴)
#   ② 미러 원본   → course/capstone-rag-llm-serving/manifests/23-vllm-hf-secret.yaml
#                  (vLLM 전용 Secret 과 *완전 동일한 키 HF_TOKEN* — 의도적 중복)
#   ③ 결정 근거   → docs/capstone-plan.md §7 Day 7 + lesson.md §4.8 결정 박스 ②
#
# 캡스톤 Day 7 — RAG API 전용 Secret 입니다. 23-vllm-hf-secret 을 재사용하지 않고 *별도* 로 두는
# 이유 (lesson.md §4.8 결정 박스 ②):
#   ① 컴포넌트별 RBAC 분리 가능 — vLLM 전용 vs RAG API 전용 권한 격리
#   ② Helm Day 10 templates/ 분리 깔끔 — `templates/vllm.yaml` 과 `templates/rag-api.yaml` 가 각자의 Secret 참조
#   ③ "vLLM 전용 이름(`hf-secret`)" 을 RAG API 가 참조하면 *의미 오용* 발생 (RAG API 가 vLLM Secret 에 의존)
# 단점: HF_TOKEN 값을 두 Secret 에 *중복 입력* 해야 함. 캡스톤 학습 단계에서는 placeholder 라 무영향.
#
# ⚠ 본 캡스톤 Day 7 의 디폴트는 Secret 미적용 입니다 — RAG API 자체는 HF Hub 호출이 적고
#   e5-small public 이라 토큰 없이 동작합니다. Deployment 30 의 `envFrom: secretRef.optional: true`
#   가 Secret 부재를 정상 처리합니다.
#
# Secret apply 가 *필수* 가 되는 두 시나리오 (Day 4 의 23 와 동일 — lesson.md §4.3 결정 박스 ④ 인용):
#   ① HuggingFace anonymous rate limit 도달 (모델 다운로드 빈도 높을 때 401 Unauthorized)
#   ② gated 모델로 임베딩 모델 교체 (예: BAAI/bge-* 일부) — 캡스톤 디폴트 e5-small 은 public
# 두 경우 모두 학습자는 아래 stringData 의 placeholder 를 본인 토큰으로 바꿔 apply:
#   sed -i.bak 's/REPLACE_WITH_YOUR_HF_TOKEN/hf_your_token_here/' \
#     course/capstone-rag-llm-serving/manifests/33-rag-api-secret.yaml
#   kubectl apply -f course/capstone-rag-llm-serving/manifests/33-rag-api-secret.yaml
#   kubectl rollout restart deployment/rag-api -n rag-llm        # Secret 변경도 ConfigMap 과 동일하게 수동 재기동
#
# ⚠ `data` vs `stringData` 혼동 주의 (자주 하는 실수 #21):
#   - `data` 는 base64 인코딩된 값을 받음 — 평문 넣으면 디코딩 실패
#   - `stringData` 는 평문 그대로 — 본 매니페스트가 사용하는 형식
#   평문이 필요하면 `stringData` 또는 `kubectl create secret --from-literal=HF_TOKEN=hf_xxx` 사용.
#
# ⚠ 본 파일을 git 에 커밋하기 *전* 에 placeholder 를 진짜 토큰으로 바꾸지 마세요.
#   - 실습용: 로컬에서만 토큰을 임시 입력하고 적용. 작업 후 `git checkout` 으로 placeholder 복원.
#   - 운영: SealedSecrets / External Secrets Operator / Workload Identity 로 평문 토큰이 매니페스트에 안 남게 (Phase 5 주제).

apiVersion: v1
kind: Secret
metadata:
  name: rag-api-secrets                              # Deployment 30 의 envFrom.secretRef.name 과 일치
  namespace: rag-llm
  labels:
    app: rag-api
    component: rag-api
type: Opaque
stringData:
  # HuggingFace > Settings > Access Tokens 에서 "read" 권한 토큰 발급 후 붙여넣습니다.
  # e5-small 만 쓸 거면 빈 문자열로 두거나 본 매니페스트 자체를 미적용해도 됩니다 (Deployment 의 optional: true 가 동작).
  HF_TOKEN: "REPLACE_WITH_YOUR_HF_TOKEN_OR_LEAVE_EMPTY"

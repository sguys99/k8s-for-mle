# 출처:
#   ① 골격      → course/phase-3-production/03-autoscaling-hpa/manifests/prometheus-adapter/values.yaml
#                 (rules.custom 의 4 단계 흐름: seriesQuery / resources.overrides / name / metricsQuery)
#   ② 결정 근거   → docs/architecture.md §3.13 + lesson.md §7 결정 박스 ②
#
# 캡스톤 Day 8 — prometheus-adapter Helm chart 의 values.
# 본 파일은 `kubectl apply` 대상이 아닙니다. 다음 명령으로 사용:
#
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm install prometheus-adapter prometheus-community/prometheus-adapter \
#     -n monitoring \
#     -f course/capstone-rag-llm-serving/manifests/60-prometheus-adapter-values.yaml \
#     --version 4.10.0 --wait
#
# 역할: Prometheus 가 수집한 시계열을 K8s 의 `custom.metrics.k8s.io` API 로 노출 →
#       HPA 25/35 가 spec.metrics.type: Pods 로 그 메트릭을 직접 소비할 수 있게 됨.
#
# ⚠ Prometheus URL 은 Day 7 의 release name 에 따라 결정됩니다 (자주 하는 실수 #19 와 동일 패턴):
#   Day 7 의 `helm install prom prometheus-community/kube-prometheus-stack` 가 release 이름을
#   "prom" 으로 두므로, 아래 URL 의 `prom-kube-prometheus-stack-prometheus` 가 정확히 매칭.
#   다른 이름으로 설치했다면 `kubectl get svc -n monitoring | grep prometheus` 로 확인 후 수정.

prometheus:
  url: http://prom-kube-prometheus-stack-prometheus.monitoring.svc
  port: 9090
  path: ""

# adapter 자체는 가벼운 stateless 변환기 — 학습 환경 부담 최소화.
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

replicas: 1

# 디폴트 룰(kubelet, node, container 메트릭 변환) 은 본 캡스톤에서 사용하지 않으므로 비활성.
# 운영에선 디폴트 룰을 켜둔 채 custom 룰만 추가하는 것이 일반적입니다.
rules:
  default: false

  # custom — Prometheus 시리즈를 K8s 자원에 매핑하는 핵심 규칙.
  custom:
    # ─ 규칙 1: RAG API Counter → req/s (Pods 메트릭) ─────────────────────
    #
    # 흐름 ① seriesQuery: adapter 가 Prometheus 에 어떤 시계열을 조회할지.
    #         라벨 셀렉터 (namespace!="", pod!="") 로 K8s 자원 라벨을 가진 시리즈만 후보화.
    #         `rag_chat_total` 은 Day 5 main.py 의 Counter (status 라벨 포함) — Day 7 ServiceMonitor 가 수집.
    #
    # 흐름 ② resources.overrides: Prometheus 라벨을 K8s 자원으로 매핑.
    #         kube-prometheus-stack 의 ServiceMonitor 가 만드는 라벨이 namespace / pod 이므로 그대로 매핑.
    #         (라벨 이름이 다르면 kubectl get --raw 결과에서 메트릭이 안 보임)
    #
    # 흐름 ③ name.matches / as: API 에 노출될 메트릭 이름 변환.
    #         "_total" 로 끝나는 Counter 를 "_per_second" 로 바꿔 의미를 명확히.
    #         결과: rag_chat_total → rag_chat_requests_per_second (HPA 35 가 참조하는 이름)
    #
    # 흐름 ④ metricsQuery: adapter 가 실제로 Prometheus 에 던지는 PromQL.
    #         <<.Series>>, <<.LabelMatchers>>, <<.GroupBy>> 는 adapter 가 런타임에 치환.
    #         rate window 는 ServiceMonitor interval (30s) 의 4 배 이상인 2m 로 안전하게.
    - seriesQuery: 'rag_chat_total{namespace!="",pod!=""}'
      resources:
        overrides:
          namespace:
            resource: namespace
          pod:
            resource: pod
      name:
        matches: "^(.*)_total$"
        as: "${1}_requests_per_second"      # rag_chat_total → rag_chat_requests_per_second
      metricsQuery: |
        sum(rate(<<.Series>>{<<.LabelMatchers>>}[2m])) by (<<.GroupBy>>)

    # ─ 규칙 2: vLLM Gauge → 별칭만 부여 (rate 불필요) ─────────────────────
    #
    # vLLM 의 `vllm:num_requests_running` 은 Gauge 타입이라 rate() 불필요 — 현재값 그대로 사용.
    # 하지만 메트릭명에 콜론(`:`) 이 있어 K8s API path 에 안전하지 않음.
    # 일부 client/HPA 가 path encoding 실패 → 자주 하는 실수 #22 의 표면.
    # 해결: name.matches 로 콜론을 언더스코어로 변환 — vllm:num_requests_running → vllm_num_requests_running.
    #
    # metricsQuery 에 rate() 가 아닌 avg() 사용 — Gauge 의 현재값을 Pod 별로 가져오는 표준 PromQL.
    - seriesQuery: 'vllm:num_requests_running{namespace!="",pod!=""}'
      resources:
        overrides:
          namespace:
            resource: namespace
          pod:
            resource: pod
      name:
        matches: "^vllm:(.*)$"
        as: "vllm_${1}"                     # vllm:num_requests_running → vllm_num_requests_running
      metricsQuery: |
        avg(<<.Series>>{<<.LabelMatchers>>}) by (<<.GroupBy>>)

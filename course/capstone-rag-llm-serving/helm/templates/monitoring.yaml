{{/*
templates/monitoring.yaml — 모니터링 ConfigMap 2 종 (Day 8)

raw 매니페스트 매핑:
  ・ manifests/60-prometheus-adapter-values.yaml → 본 파일 §1 prometheus-adapter values ConfigMap (별도 helm install 입력)
  ・ manifests/61-grafana-rag-dashboard.yaml     → 본 파일 §2 Grafana dashboard ConfigMap (sidecar 자동 import)

본 차트가 *직접* 설치하지 않는 의존 (lesson.md §8.4 결정 박스):
  ① kube-prometheus-stack       — Day 7 에 별도 helm install (release name "prom")
  ② prometheus-adapter           — Day 8 에 별도 helm install — 본 차트는 입력 ConfigMap 만 동봉
  ③ Grafana                      — kube-prometheus-stack 에 포함 (sidecar 활성)

본 차트가 직접 만드는 ConfigMap 2 종:
  ① prometheus-adapter-values    — 학습자가 helm install 시 -f 인자로 사용 (NOTES.txt 안내)
  ② rag-llm-grafana-dashboard    — Grafana sidecar 가 watch 해 자동 import (~30 초)

ServiceMonitor 2 종은 본 파일이 아닌 vllm.yaml / rag-api.yaml 안에 *컴포넌트와 함께* 위치.
이 분리 근거: ServiceMonitor 는 *Service 와 1:1 대응* 이라 컴포넌트 매니페스트와 함께 두는 것이 자연스럽고,
serviceMonitor.enabled=false 시 ServiceMonitor 만 끌 수 있는 세밀한 제어가 가능합니다.
*/}}

{{/* ═══════════════════════════════════════════════════════════════════════
     §1. prometheus-adapter values (별도 helm install 입력)
     ═══════════════════════════════════════════════════════════════════════
     사용 (NOTES.txt 안내):
       kubectl get cm prometheus-adapter-values -n {{ .Values.namespace }} \
         -o jsonpath='{.data.values\.yaml}' > /tmp/adapter-values.yaml
       helm install prometheus-adapter prometheus-community/prometheus-adapter \
         -n monitoring -f /tmp/adapter-values.yaml --version 4.10.0 --wait
     */}}
{{- if .Values.monitoring.prometheusAdapter.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-adapter-values
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "capstone-rag-llm.commonLabels" . | nindent 4 }}
    {{- include "capstone-rag-llm.componentLabels" (dict "component" "prometheus-adapter" "role" "monitoring") | nindent 4 }}
data:
  values.yaml: |
{{ tpl (.Files.Get "files/prometheus-adapter-values.yaml") . | indent 4 }}
{{- end }}

{{/* ═══════════════════════════════════════════════════════════════════════
     §2. Grafana dashboard ConfigMap (sidecar 자동 import)
     ═══════════════════════════════════════════════════════════════════════
     - namespace: monitoring (관행상) — Grafana sidecar 는 모든 namespace watch
     - label `grafana_dashboard: "1"` 매칭 시 자동 import (Phase 3-02 패턴)
     - data 키 이름은 .json 확장자 필수 (sidecar 가 파일명으로 사용)
     */}}
{{- if .Values.monitoring.grafanaDashboard.enabled }}
{{- if .Values.monitoring.prometheusAdapter.enabled }}
---
{{- end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: rag-llm-grafana-dashboard
  namespace: {{ .Values.monitoring.grafanaDashboard.namespace }}
  labels:
    {{- include "capstone-rag-llm.commonLabels" . | nindent 4 }}
    {{- include "capstone-rag-llm.componentLabels" (dict "component" "rag-llm" "role" "dashboard") | nindent 4 }}
    # Grafana sidecar 가 watch 하는 라벨 — 누락 시 import 안 됨 (자주 하는 실수 #19 와 같은 패턴)
    {{ .Values.monitoring.grafanaDashboard.sidecarLabel }}: "1"
data:
  rag-llm.json: |
{{ .Files.Get "dashboards/rag-llm.json" | indent 4 }}
{{- end }}

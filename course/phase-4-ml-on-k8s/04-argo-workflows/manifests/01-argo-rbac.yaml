# Argo Workflows 가 ml-pipelines 네임스페이스에서 자식 Pod 을 띄우려면
# Workflow Pod 자체가 ServiceAccount 를 가지고, 그 SA 가 pods/pods-logs 등을 조작할 수 있어야 합니다.
# default ServiceAccount 로 워크플로우를 제출하면 "pods is forbidden" 으로 즉시 실패합니다.
# (lesson.md 의 자주 하는 실수 1번 시연 매니페스트.)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: workflow                        # Workflow.spec.serviceAccountName 에서 참조하는 이름
  namespace: ml-pipelines
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: workflow
  namespace: ml-pipelines
rules:
# 자식 Pod 생성/조회/감시. argo controller 가 아닌 workflow Pod 자체가 호출하는 권한입니다.
- apiGroups: [""]
  resources: ["pods", "pods/exec"]
  verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get", "list", "watch"]
# 단계 사이의 결과를 저장하는 CRD (parameters/artifacts 결과를 controller 가 보관하는 곳)
- apiGroups: ["argoproj.io"]
  resources: ["workflowtaskresults"]
  verbs: ["create", "get", "list", "watch", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: workflow
  namespace: ml-pipelines
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: workflow
subjects:
- kind: ServiceAccount
  name: workflow
  namespace: ml-pipelines

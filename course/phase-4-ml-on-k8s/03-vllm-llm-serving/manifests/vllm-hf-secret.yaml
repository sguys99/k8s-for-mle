# vllm-hf-secret.yaml — HuggingFace 토큰 Secret (gated 모델용, 옵션)
#
# Phase 2/01 [course/phase-2-operations/01-configmap-secret/manifests/hf-secret.yaml] 의
# 패턴을 그대로 차용합니다 — 다른 점은 namespace 와 라벨 뿐입니다.
#
# 본 토픽의 메인 모델 `microsoft/phi-2` 는 *public* 이라 HF 토큰 없이도 다운로드됩니다.
# 그러나 다음 두 경우 토큰이 *필수* 가 됩니다.
#   ① 캡스톤에서 `meta-llama/Llama-3.x-Instruct` 같은 *gated* 모델로 전환할 때
#   ② HuggingFace 의 anonymous rate limit (시간당 수십 회) 에 걸릴 때 — 토큰이 있으면 한도가 훨씬 큼
# 두 경우 모두 본 매니페스트를 그대로 apply 하고, vllm-phi2-deployment.yaml 의
# `valueFrom.secretKeyRef.optional: true` 가 false 가 아니어도 정상 동작합니다.
#
# ⚠ 학습자가 이 파일을 git 에 커밋하기 *전에* base64 자리에 진짜 토큰을 넣지 마세요.
#   - 실습용: 아래 stringData 의 placeholder 를 *로컬에서만* 본인 토큰으로 바꿔 apply.
#   - 운영: SealedSecrets / External Secrets Operator 등으로 평문 토큰이 매니페스트에 안 남게.

apiVersion: v1
kind: Secret
metadata:
  name: hf-secret
  labels:
    app: vllm-phi2
    phase: "4"
    topic: "03-vllm-llm-serving"
type: Opaque
stringData:
  # HuggingFace > Settings > Access Tokens 에서 "read" 권한 토큰을 발급해 붙여넣습니다.
  # public 모델만 쓸 거면 빈 문자열로 두어도 OK — Deployment 의 optional: true 가 동작.
  HF_TOKEN: "REPLACE_WITH_YOUR_HF_TOKEN_OR_LEAVE_EMPTY"

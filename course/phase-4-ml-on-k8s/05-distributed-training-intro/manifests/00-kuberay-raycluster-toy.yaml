# =============================================================================
# Phase 4 / 05 — KubeRay RayCluster (토이, CPU only)
#
# 본 매니페스트는 KubeRay operator 가 만든 RayCluster CRD 의 *최소 필드* 만 사용해
# minikube CPU 환경에서 head 1 + worker 2 구조를 띄웁니다. 본 토픽은 분산 학습
# *입문* 이므로 GPU 없이 Ray 클러스터의 head/worker 분리, dashboard, autoscaling 끔
# 같은 *디자인 요소* 를 직접 보는 것이 목표입니다.
#
# - 적용:        kubectl apply -n ray-demo -f manifests/00-kuberay-raycluster-toy.yaml
# - 검증:        kubectl get raycluster,pods -n ray-demo
# - 정리:        kubectl delete -f manifests/00-kuberay-raycluster-toy.yaml -n ray-demo
#
# CRD 가 클러스터에 등록되어 있어야 합니다 — labs/README.md Step 1 (KubeRay
# operator Helm 설치) 을 먼저 수행하세요. 그렇지 않으면 `no matches for kind
# "RayCluster" in version "ray.io/v1"` 에러가 발생합니다.
# =============================================================================
apiVersion: ray.io/v1
kind: RayCluster
metadata:
  name: raycluster-toy
  # ray-demo namespace 는 labs/README.md Step 1 에서 미리 생성합니다.
spec:
  # rayVersion 은 head/worker 컨테이너 이미지의 ray 버전과 *반드시 일치* 해야 합니다.
  # 불일치 시 head 와 worker 의 GCS(Global Control Service) 핸드셰이크가 실패합니다.
  rayVersion: "2.9.0"

  # 본 토픽은 *고정 크기* 클러스터로 demo. 실제 운영에서는 enableInTreeAutoscaling: true
  # + workerGroupSpecs.minReplicas/maxReplicas 로 동적 확장합니다.
  enableInTreeAutoscaling: false

  # ---------------------------------------------------------------------------
  # Head 그룹 — Ray 클러스터의 컨트롤 플레인 (1개 고정)
  # GCS, Dashboard(8265), Client server(10001), Object Manager 가 모두 head 에 위치
  # ---------------------------------------------------------------------------
  headGroupSpec:
    rayStartParams:
      # head 자체를 worker 로 함께 쓰지 않습니다 (학습 환경의 단순화).
      # 운영에서는 head 도 task 를 받게 두는 것이 일반적입니다.
      num-cpus: "0"
      # dashboard 를 0.0.0.0 으로 바인딩 — port-forward 로 외부에서 접근하기 위함.
      dashboard-host: "0.0.0.0"
    template:
      spec:
        containers:
        - name: ray-head
          # CPU 전용 ray 이미지. GPU 학습 시 rayproject/ray:2.9.0-gpu 로 교체.
          image: rayproject/ray:2.9.0
          imagePullPolicy: IfNotPresent
          ports:
          - { containerPort: 6379,  name: gcs-server }     # head 와 worker 가 통신하는 포트
          - { containerPort: 8265,  name: dashboard }      # Ray Dashboard (브라우저)
          - { containerPort: 10001, name: client }         # ray.init(address="ray://...") 클라이언트
          # minikube 의 자원 압박을 막기 위해 보수적으로 잡습니다.
          # 실 운영에서는 head 도 학습/추론 task 를 일부 받으므로 더 큰 값을 씁니다.
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits:   { cpu: "1",    memory: "2Gi" }

  # ---------------------------------------------------------------------------
  # Worker 그룹 — 실제 Ray task / actor 가 실행되는 노드 (2개 고정)
  # ---------------------------------------------------------------------------
  workerGroupSpecs:
  - groupName: small-workers
    replicas: 2
    minReplicas: 2     # autoscaler 비활성 상태에서도 명시 (KubeRay 의 schema 요구)
    maxReplicas: 2
    rayStartParams: {}
    template:
      spec:
        containers:
        - name: ray-worker
          image: rayproject/ray:2.9.0
          imagePullPolicy: IfNotPresent
          # worker 도 head 와 같은 자원 — 토이 클러스터 합산: head(1) + worker(2*1) = ~3 CPU
          # minikube --cpus=4 --memory=8g 권장의 근거.
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits:   { cpu: "1",    memory: "2Gi" }
          # GPU 학습 시 worker 에만 GPU 를 주고 head 는 CPU 로 두는 것이 일반적:
          # resources: { limits: { nvidia.com/gpu: 1 } }
          # rayStartParams: { num-gpus: "1" }
